name: Momentum Scanner

on:
  schedule:
    - cron: '45 10 * * 1-5'   # India: 4:15 PM IST (after NSE close)
    - cron: '30 21 * * 1-5'   # US:    10:30 PM IST (after Nasdaq close)

  workflow_dispatch:
    inputs:
      market:
        description: 'Which market to scan'
        required: false
        default: 'both'
        type: choice
        options: [both, india, us]

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-momentum
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install yfinance pytz requests pandas lxml --quiet

      - name: Set scan market
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "SCAN_MARKET=${{ github.event.inputs.market }}" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "45 10 * * 1-5" ]; then
            echo "SCAN_MARKET=india" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "30 21 * * 1-5" ]; then
            echo "SCAN_MARKET=us" >> $GITHUB_ENV
          else
            echo "SCAN_MARKET=both" >> $GITHUB_ENV
          fi

      - name: Run momentum scanner
        run: python scan.py
        env:
          SCAN_MARKET: ${{ env.SCAN_MARKET }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Commit results
        run: |
          git config user.name  "Momentum Scanner Bot"
          git config user.email "scanner@github-actions.bot"
          git add data/signals.json portfolio.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "scan: ${{ env.SCAN_MARKET }} — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅ Results committed"
          fi
